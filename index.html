<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corte de Caja Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="app-container">
        
        <div id="contenedorReporte">
            <header class="app-header">
                <h1>Corte de Caja</h1>
                <input type="date" id="fechaCorteInput" class="date-picker-custom">
                <div id="fechaCorteDisplay" class="fecha-larga-text"></div>
            </header>

            <main>
                <section class="card">
                    <div class="card-header">Control de Kilometraje</div>
                    <div class="input-group">
                        <label>KM Salida</label>
                        <input type="number" id="kmSalida" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>KM Llegada</label>
                        <input type="number" id="kmLlegada" placeholder="0">
                    </div>
                    <div class="result-row bg-yellow">
                        <span>Recorrido Total</span>
                        <span id="kmRecorridos" class="bold-value">0 km</span>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">Gasto de Combustible</div>
                    <div class="input-group">
                        <label>Precio por Litro ($)</label>
                        <input type="number" step="0.01" id="precioLitro" value="23.99">
                    </div>
                    <div class="input-group">
                        <label>Carga ($)</label>
                        <input type="number" id="cargaPesos" placeholder="Autocalculado">
                    </div>
                    <div class="result-row bg-orange">
                        <span>Gasolina a Descontar</span>
                        <span id="gasTotal" class="bold-value">$0.00</span>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">Ingresos (Viajes)</div>
                    <div id="contenedorViajes">
                        </div>
                    <button id="btnAgregarViaje" class="btn-secondary">+ Agregar Viaje</button>
                    <div class="result-row bg-light-green mt-1">
                        <span>Total Generado</span>
                        <span id="totalGenerado" class="bold-value">$0.00</span>
                    </div>
                </section>

                <section class="totals-section">
                    <div class="net-profit">
                        <small>Ganancia Neta</small>
                        <div id="gananciaNeta" class="money-huge">$0.00</div>
                    </div>
                    <div class="split-profit">
                        <small>Ganancia Individual</small>
                        <div id="gananciaDividida" class="money-large">$0.00 c/u</div>
                    </div>
                </section>
            </main>
        </div>
        <section class="card history-card">
            <div class="card-header">Historial de Cortes Guardados</div>
            <div id="listaHistorial" class="history-list">
                </div>
        </section>

        <footer class="app-actions">
            <button id="btnNuevoDia" class="btn-primary btn-blue">☀️ Nuevo Día</button>
            <button id="btnCompartirImg" class="btn-primary btn-purple">📲 Compartir en WhatsApp</button>
        </footer>
    </div>
</body>
</html>
